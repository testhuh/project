<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1260" width="900" height="1260" font-family="'Noto Sans CJK KR','Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cfe7ff"/>
      <stop offset="45%" stop-color="#dcd3ff"/>
      <stop offset="100%" stop-color="#f4d4ff"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7a6cf6"/>
      <stop offset="50%" stop-color="#c66cf6"/>
      <stop offset="100%" stop-color="#6cb8f6"/>
    </linearGradient>
    <linearGradient id="numGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a18cff"/>
      <stop offset="100%" stop-color="#ff9cf6"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a18cff"/>
      <stop offset="50%" stop-color="#ff9cf6"/>
      <stop offset="100%" stop-color="#8cd8ff"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#7a6cf6" flood-opacity="0.18"/>
    </filter>
    <path id="star" d="M0 -10 L2.4 -3.5 L9.5 -3.1 L4 1.5 L5.9 8.5 L0 4.3 L-5.9 8.5 L-4 1.5 L-9.5 -3.1 L-2.4 -3.5 Z"/>
    <path id="folder" d="M0 4 H10 L13 8 H34 a2 2 0 0 1 2 2 V26 a2 2 0 0 1 -2 2 H2 a2 2 0 0 1 -2 -2 V6 a2 2 0 0 1 2 -2 Z"/>
    <path id="wand" d="M-22 18 L14 -18 M14 -18 L9 -22 M14 -18 L18 -13" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path id="note" d="M-2 10 a4 3 0 1 0 0.1 0 Z M2 10 V-10 L10 -13 V-4 L2 -1" />
    <path id="clapper" d="M-18 -10 H18 L14 -2 H-22 Z M-22 -2 H18 V14 a2 2 0 0 1 -2 2 H-20 a2 2 0 0 1 -2 -2 Z M-14 -10 L-10 -2 M-2 -10 L2 -2 M10 -10 L14 -2"/>
  </defs>

  <!-- 배경 -->
  <rect x="0" y="0" width="900" height="1260" fill="url(#bg)"/>

  <!-- 장식 별 -->
  <use href="#star" transform="translate(55,55) scale(1.6)" fill="#a18cff" opacity="0.6"/>
  <use href="#star" transform="translate(830,75) scale(1.2) rotate(20)" fill="#ff9cf6" opacity="0.55"/>
  <use href="#star" transform="translate(60,1215) scale(1.3) rotate(-15)" fill="#8cd8ff" opacity="0.5"/>
  <use href="#star" transform="translate(835,1230) scale(1.7) rotate(10)" fill="#a18cff" opacity="0.5"/>

  <!-- 제목 -->
  <use href="#star" transform="translate(195,45) scale(1.4)" fill="url(#numGrad)"/>
  <text x="450" y="60" font-size="30" font-weight="bold" fill="url(#titleGrad)" text-anchor="middle">디즈니 OST 유튜브 자동화 작업 요약</text>
  <use href="#wand" transform="translate(705,38) scale(0.9)" stroke="url(#numGrad)"/>
  <use href="#star" transform="translate(725,53) scale(0.8)" fill="#ff9cf6"/>
  <text x="450" y="92" font-size="15" fill="#7a6f9c" text-anchor="middle">2026-06-14</text>

  <!-- Card 1 -->
  <g filter="url(#soft)">
    <rect x="60" y="130" width="780" height="190" rx="20" fill="rgba(255,255,255,0.6)"/>
  </g>
  <circle cx="115" cy="180" r="28" fill="url(#numGrad)"/>
  <text x="115" y="189" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">1</text>
  <text x="160" y="188" font-size="22" font-weight="bold" fill="#5d4fa3">곡 리스트 수집</text>
  <use href="#note" transform="translate(800,180) scale(1.6)" fill="#a18cff" stroke="#a18cff" stroke-width="1.5"/>
  <text x="115" y="232" font-size="16" fill="#4a3f6b">• 멜론 디즈니 OST 플레이리스트 기반 곡 목록 정리</text>
  <text x="115" y="262" font-size="16" fill="#4a3f6b">• 유튜브 저장 가능 후보 18곡 선정</text>
  <text x="115" y="292" font-size="16" fill="#4a3f6b">• CSV / JSON 파일로 후보 리스트 정리</text>

  <!-- Card 2 -->
  <g filter="url(#soft)">
    <rect x="60" y="350" width="780" height="190" rx="20" fill="rgba(255,255,255,0.6)"/>
  </g>
  <circle cx="115" cy="400" r="28" fill="url(#numGrad)"/>
  <text x="115" y="409" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">2</text>
  <text x="160" y="408" font-size="22" font-weight="bold" fill="#5d4fa3">재생목록 자동화 스크립트</text>
  <g transform="translate(800,400)">
    <rect x="-16" y="-14" width="32" height="28" rx="6" fill="none" stroke="#a18cff" stroke-width="2.5"/>
    <circle cx="-7" cy="-2" r="3" fill="#a18cff"/>
    <circle cx="7" cy="-2" r="3" fill="#a18cff"/>
    <line x1="-8" y1="8" x2="8" y2="8" stroke="#a18cff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="-14" x2="0" y2="-20" stroke="#a18cff" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="0" cy="-22" r="2.5" fill="#a18cff"/>
  </g>
  <text x="115" y="452" font-size="16" fill="#4a3f6b">• Playwright로 Chrome 자동 제어 (기존 로그인 세션 재사용)</text>
  <text x="115" y="482" font-size="16" fill="#4a3f6b">• 곡 검색 → 영상 진입 → 재생목록 자동 저장</text>
  <text x="115" y="512" font-size="16" fill="#4a3f6b">• 총 18곡 순차 처리, 성공/실패 결과 수집</text>

  <!-- Card 3 -->
  <g filter="url(#soft)">
    <rect x="60" y="570" width="780" height="190" rx="20" fill="rgba(255,255,255,0.6)"/>
  </g>
  <circle cx="115" cy="620" r="28" fill="url(#numGrad)"/>
  <text x="115" y="629" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">3</text>
  <text x="160" y="628" font-size="22" font-weight="bold" fill="#5d4fa3">녹화 &amp; 결과 리포트</text>
  <use href="#clapper" transform="translate(800,620) scale(1.1)" fill="none" stroke="#a18cff" stroke-width="2.5" stroke-linejoin="round"/>
  <text x="115" y="672" font-size="16" fill="#4a3f6b">• 자동화 진행 화면 자동 녹화 후 30초 미리보기(mp4) 생성</text>
  <text x="115" y="702" font-size="16" fill="#4a3f6b">• 성공/실패 결과를 HTML 리포트로 출력</text>
  <text x="115" y="732" font-size="16" fill="#4a3f6b">• 실패한 곡은 사유와 함께 표기</text>

  <!-- Card 4 -->
  <g filter="url(#soft)">
    <rect x="60" y="790" width="780" height="190" rx="20" fill="rgba(255,255,255,0.6)"/>
  </g>
  <circle cx="115" cy="840" r="28" fill="url(#numGrad)"/>
  <text x="115" y="849" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">4</text>
  <text x="160" y="848" font-size="22" font-weight="bold" fill="#5d4fa3">디즈니 감성 테마 디자인</text>
  <use href="#star" transform="translate(790,830) scale(1.2)" fill="#ff9cf6"/>
  <use href="#star" transform="translate(810,852) scale(0.8) rotate(20)" fill="#a18cff"/>
  <use href="#star" transform="translate(775,855) scale(0.6) rotate(-10)" fill="#8cd8ff"/>
  <text x="115" y="892" font-size="16" fill="#4a3f6b">• 파스텔 블루 → 퍼플 → 핑크 그라데이션 배경</text>
  <text x="115" y="922" font-size="16" fill="#4a3f6b">• 별 · 마법지팡이 아이콘, 카드형 곡 리스트</text>
  <text x="115" y="952" font-size="16" fill="#4a3f6b">• 반짝이는 그라데이션 진행률 바 적용</text>

  <!-- 진행률 바 -->
  <text x="115" y="1015" font-size="15" fill="#5d4fa3" font-weight="bold">전체 작업 진행률</text>
  <text x="785" y="1015" font-size="15" fill="#5d4fa3" font-weight="bold" text-anchor="end">100%</text>
  <rect x="60" y="1025" width="780" height="22" rx="11" fill="rgba(255,255,255,0.55)"/>
  <rect x="60" y="1025" width="780" height="22" rx="11" fill="url(#barGrad)"/>

  <!-- 산출물 -->
  <g filter="url(#soft)">
    <rect x="60" y="1070" width="780" height="160" rx="20" fill="rgba(255,255,255,0.6)"/>
  </g>
  <use href="#folder" transform="translate(95,1098) scale(1.3)" fill="url(#numGrad)"/>
  <text x="150" y="1110" font-size="20" font-weight="bold" fill="#5d4fa3">산출물</text>
  <text x="115" y="1145" font-size="15" fill="#4a3f6b">disney_ost_playlist.py · disney_ost_playlist_guide.md</text>
  <text x="115" y="1172" font-size="15" fill="#4a3f6b">disney_ost_youtube_candidates.csv / .json</text>
  <text x="115" y="1199" font-size="15" fill="#4a3f6b">result_*.html (디즈니 테마 리포트) · preview_*.mp4 (30초 클립)</text>
</svg>
